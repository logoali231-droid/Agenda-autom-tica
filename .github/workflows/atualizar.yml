name: Atualizar Notas PUCPR

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar atualizacao
        env:
          CANVAS_TOKEN: ${{ secrets.CANVAS_TOKEN }}
        run: |
          python atualizar_notas.py

      - name: Salvar planilha atualizada
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add Painel_Academico_PUCPR.xlsx

          git commit -m "Atualizacao automatica das notas" || echo "Sem alteracoes"

          git push
